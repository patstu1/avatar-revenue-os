[alembic]
# Resolved relative to this file (packages/db/). Use `alembic -c packages/db/alembic.ini` from repo root.
script_location = packages/db/alembic
sqlalchemy.url = postgresql://avataros:changeme_in_production@postgres:5432/avatar_revenue_os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
