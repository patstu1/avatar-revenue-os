###############################################################################
# AI Avatar Revenue OS — Docker Compose (isolated environment)
# Project: avatar-revenue-os
# Production: Caddy reverse proxy on 80/443 → app.nvironments.com
# Dev debug:  postgres=5433, redis=6380, api=8001, web=3001
###############################################################################

name: avatar-revenue-os

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aro-postgres
    restart: unless-stopped
    command: postgres -c max_connections=200 -c shared_buffers=128MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - aro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aro-network

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aro-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - aro_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aro-network

  # ─── Database Migrations ───────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-migrate
    restart: "no"
    command: python3 create_tables.py
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aro-network

  # ─── FastAPI Backend ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-api
    restart: unless-stopped
    command: >
      sh -c "uvicorn apps.api.main:app
      --host 0.0.0.0 --port 8000
      --reload --log-level info"
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      API_ENV: ${API_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      TAVUS_API_KEY: ${TAVUS_API_KEY:-}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      OPERATOR_NOTIFY_EMAIL: ${OPERATOR_NOTIFY_EMAIL:-}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aro-network

  # ─── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=4
      --pidfile=/tmp/celery-worker.pid
      -Q default,generation,publishing,analytics,qa,learning,portfolio,scale_alerts,notifications,growth_pack,revenue_ceiling_a,revenue_ceiling_b,revenue_ceiling_c,expansion_pack2,mxp,creator_revenue,brain,buffer,autonomous_phase_d,cinema_studio'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      TAVUS_API_KEY: ${TAVUS_API_KEY:-}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      OPERATOR_NOTIFY_EMAIL: ${OPERATOR_NOTIFY_EMAIL:-}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celery-worker.pid && kill -0 $(cat /tmp/celery-worker.pid)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aro-network

  # ─── Celery Beat Scheduler ────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-scheduler
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celerybeat.pid &&
      celery -A workers.celery_app beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid'
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aro-network


  # ─── Next.js Frontend ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: aro-web
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./apps/web:/app/apps/web
      - aro_web_node_modules:/app/apps/web/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aro-network

volumes:
  aro_pgdata:
    name: aro_pgdata
  aro_redisdata:
    name: aro_redisdata
  aro_web_node_modules:
    name: aro_web_node_modules

networks:
  aro-network:
    name: aro-network
    driver: bridge
