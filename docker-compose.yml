###############################################################################
# AI Avatar Revenue OS — Docker Compose (isolated environment)
# Project: avatar-revenue-os
# Production: Caddy reverse proxy on 80/443 → app.nvironments.com
# Dev debug:  postgres=5433, redis=6380, api=8001, web=3001
###############################################################################

name: avatar-revenue-os

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aro-postgres
    restart: unless-stopped
    command: postgres -c max_connections=500 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - aro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aro-network

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aro-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - aro_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aro-network

  # ─── Database Migrations ───────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-migrate
    restart: "no"
    command: python3 scripts/ensure_schema.py
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aro-network

  # ─── FastAPI Backend ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-api
    restart: unless-stopped
    command: >
      sh -c "uvicorn apps.api.main:app
      --host 0.0.0.0 --port 8000
      --reload --log-level info"
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      # Infrastructure vars use Docker-internal hostnames — override .env values
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      API_ENV: ${API_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_PORT: ${SMTP_PORT:-587}
      # All provider secrets (AI, publishing, payments, etc.) are loaded
      # directly from .env via env_file above. This prevents shell env
      # variables (e.g. empty ANTHROPIC_API_KEY from dev tools) from
      # overriding the real values in .env.
      # --- Monitoring ---
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aro-network

  # ─── Celery Workers (dedicated per queue type) ─────────────────────────
  worker-generation:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-generation
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=4
      --pidfile=/tmp/celery-worker.pid
      -n worker-generation@%h
      -Q generation,pipeline,cinema_studio'
    env_file: .env
    environment: &worker-env
      # Infrastructure vars use Docker-internal hostnames — override .env values
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      SMTP_PORT: ${SMTP_PORT:-587}
      # All provider secrets loaded from .env via env_file above.
      OPERATOR_NOTIFY_EMAIL: ${OPERATOR_NOTIFY_EMAIL:-}
      # --- Misc ---
      API_SECRET_KEY: ${API_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes: &worker-volumes
      - .:/app
    healthcheck: &worker-healthcheck
      test: ["CMD-SHELL", "test -f /tmp/celery-worker.pid && kill -0 $(cat /tmp/celery-worker.pid)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on: &worker-depends
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aro-network

  worker-publishing:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-publishing
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=8
      --pidfile=/tmp/celery-worker.pid
      -n worker-publishing@%h
      -Q publishing,buffer'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  worker-analytics:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-analytics
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=4
      --pidfile=/tmp/celery-worker.pid
      -n worker-analytics@%h
      -Q analytics,learning,portfolio,qa'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  worker-outreach:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-outreach
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=4
      --pidfile=/tmp/celery-worker.pid
      -n worker-outreach@%h
      -Q outreach'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  worker-default:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-default
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=8
      --pidfile=/tmp/celery-worker.pid
      -n worker-default@%h
      -Q default,brain,mxp,scale_alerts,notifications,monetization,repurposing,autonomous_phase_d,growth_pack,revenue_ceiling_a,revenue_ceiling_b,revenue_ceiling_c,expansion_pack2,creator_revenue'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  # ─── Celery Worker: Revenue Ceilings (dev) ────────────────────────────
  # 6 colocated bursty SQL-recompute queues. Mirrors the prod topology so
  # dev exercises the same routing. Note: dev existing workers may also
  # consume some of these queues — that overlap is harmless (Celery
  # distributes tasks across consumers).
  worker-revenue-ceilings:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-revenue-ceilings
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=2
      --pidfile=/tmp/celery-worker.pid
      -n worker-revenue-ceilings@%h
      -Q revenue_ceiling_a,revenue_ceiling_b,revenue_ceiling_c,expansion_pack2,growth_pack,portfolio'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  # ─── Celery Worker: QA + Cinema Studio (dev) ──────────────────────────
  worker-qa-cinema:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-qa-cinema
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=2
      --pidfile=/tmp/celery-worker.pid
      -n worker-qa-cinema@%h
      -Q qa,cinema_studio'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  # ─── Celery Worker: Buffer + Meta-Monitoring (dev) ────────────────────
  worker-buffer-meta:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-worker-buffer-meta
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celery-worker.pid &&
      celery -A workers.celery_app worker
      --loglevel=info --concurrency=1
      --pidfile=/tmp/celery-worker.pid
      -n worker-buffer-meta@%h
      -Q buffer,autonomous_phase_d'
    env_file: .env
    environment: *worker-env
    volumes: *worker-volumes
    healthcheck: *worker-healthcheck
    depends_on: *worker-depends
    networks:
      - aro-network

  # ─── Celery Beat Scheduler ────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aro-scheduler
    restart: unless-stopped
    command: >
      sh -c 'rm -f /tmp/celerybeat.pid &&
      celery -A workers.celery_app beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid'
    env_file: .env
    environment:
      # Infrastructure vars — Docker-internal hostnames override .env
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aro-network


  # ─── Next.js Frontend ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: aro-web
    restart: unless-stopped
    working_dir: /app/apps/web
    command: npm run dev
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./apps/web:/app/apps/web
      - aro_web_node_modules:/app/apps/web/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aro-network

  # ─── Caddy Reverse Proxy ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: aro-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - aro_caddy_data:/data
      - aro_caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-app.nvironments.com}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - aro-network

volumes:
  aro_pgdata:
    name: aro_pgdata
  aro_redisdata:
    name: aro_redisdata
  aro_web_node_modules:
    name: aro_web_node_modules
  aro_caddy_data:
    name: aro_caddy_data
  aro_caddy_config:
    name: aro_caddy_config

networks:
  aro-network:
    name: aro-network
    driver: bridge
